
####全域設定#####
user  nginx; # Nginx 用 nginx 這個使用者身份執行
worker_processes  auto; # 工作進程數量，auto = 自動偵測 CPU 核心數


####錯誤日誌 & PID####
error_log  /var/log/nginx/error.log warn;  # 錯誤 log 存在這，warn 等級以上才記錄
pid        /var/run/nginx.pid; # 主進程的 PID 檔案位置

####events####
events {
    worker_connections  1024; # 每個 worker 最多處理 1024 個同時連線
}

####http — 主要的 HTTP 設定####
http {
    include       /etc/nginx/mime.types; # 載入 MIME 類型，讓瀏覽器知道 .js 是 JavaScript、.css 是 CSS 等
    default_type  application/octet-stream; # 不認識的檔案類型就當成二進位檔下載
    ####log 格式####
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"'; # 定義 log 格式（IP、時間、請求、狀態碼等）

    access_log  /var/log/nginx/access.log  main;  # 每個請求都記錄到這個檔案
    ####效能設定####
    sendfile        on;
    keepalive_timeout  65;
    ####gzip 壓縮####
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    ####server — 你的網站####
    server { 
        listen       80; # 監聽 80 port（HTTP）
        server_name  _; #代表接受所有請求，不綁定特定 IP 或域名

        root   /usr/share/nginx/html; # 靜態檔的根目錄（你的 Vue dist 就掛在這）
        index  index.html index.htm; # 預設首頁檔案
        ####location — 路由規則####
        location / {
            try_files $uri $uri/ /index.html;
        }
        #這是最關鍵的部分。當請求進來時：
        #1. $uri — 先找有沒有這個檔案（例如 /assets/index.js → 找到 JS 檔，回傳）
        #2. $uri/ — 找有沒有這個資料夾
        #3. /index.html — 都找不到就回傳 index.html，讓 Vue Router 處理路由
        #沒有第 3 步的話，直接連 http://139.162.101.11/login 會 404，因為伺服器上沒有 /login 這個檔案。

        location /api/ {
            proxy_pass http://server:3000/api/; #所有 /api/ 開頭的請求轉發給 server 容器的 3000 port。server 是 Docker 容器的名稱，Docker 內部網路會自動解析。
            proxy_set_header X-Real-IP $remote_addr; #這三行是把客戶端的原始資訊傳給後端 #客戶端的真實 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; #完整的 IP 轉發鏈（經過多層 proxy 時）
            proxy_set_header Host $host; #原始請求的域名
            #沒加的話，後端收到的 IP 都是 Nginx 容器的內部 IP（例如 172.18.0.5），不是使用者的真實 IP。
            #rate limiter 會受影響——所有請求都被當成同一個 IP，一個人觸發限流就全部人都被擋。加了這三行，rate limiter 才能正確辨別不同使用者。   
        }
    }
}
