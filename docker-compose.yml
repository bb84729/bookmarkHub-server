services:
  # ---- MongoDB 容器 ----
  mongodb:
    image: mongo:7 # 直接用官方 image，不需要自己寫 Dockerfile
    container_name: bookmarkhub-mongodb
    restart: unless-stopped # 掛掉自動重啟，除非你手動停止
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: bookmarkhub
    ports:
      - '27017:27017' # 讓你本地也可以用 MongoDB Compass 連進來看資料
    volumes:
      - mongodb_data:/data/db # 資料持久化，容器重啟後資料不會消失

  # ---- Redis 容器 ----
  redis:
    image: redis:7-alpine
    container_name: bookmarkhub-redis
    restart: unless-stopped
    ports:
      - '6379:6379' # 讓你本地也可以用 Redis client 連進來
    volumes:
      - redis_data:/data # 資料持久化

  # ---- Node.js Server 容器 ----
  server:
    build:
      context: . # Dockerfile 在哪裡（當前目錄）
      target: production # 用 multi-stage 的 production stage
    container_name: bookmarkhub-server
    restart: unless-stopped
    ports:
      - '3000:3000' # 本地 3000 → 容器 3000
    env_file:
      - .env.docker # 環境變數從外部檔案讀取，不寫死在 compose 裡
    depends_on:
      - mongodb # 確保 mongodb 容器先啟動，server 才啟動
      - redis # 確保 redis 容器先啟動，server 才啟動

  # ---- Nginx 容器 ----
  nginx:
    image: nginx
    container_name: bookmarkhub-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 把你專案裡的 nginx.conf 掛到容器裡 Nginx 讀設定的位置
      # :ro = read only，容器只能讀不能改
      - /root/bookmarkHub-client/dist:/usr/share/nginx/html:ro
      # 把 VPS 上的前端 dist 資料夾掛到容器裡 Nginx serve 靜態檔的位置
      # 因為是 volume 掛載，更新 dist 後不用 restart
    depends_on:
      - server

# 宣告 named volume，讓 Docker 管理資料儲存位置
volumes:
  mongodb_data:
  redis_data:
